<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>404 — Page Not Found | Kodra WSL</title>
    <link rel="canonical" href="https://kodra.wsl.codetocloud.io">
    <link rel="icon" type="image/png" href="/assets/favicon.ico.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-terminal: #0e0e16;
            --border-default: #1e1e2e;
            --text-primary: #e4e4ef;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --accent-purple: #7c6aff;
            --accent-green: #00d4aa;
            --accent-cyan: #00b4d8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        .glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }

        .glow-purple {
            background: var(--accent-purple);
            top: -100px;
            right: -100px;
        }

        .glow-green {
            background: var(--accent-green);
            bottom: -100px;
            left: -100px;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
        }

        .error-code {
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -0.04em;
        }

        .message {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .terminal-block {
            background: var(--bg-terminal);
            border: 1px solid var(--border-default);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            text-align: left;
            overflow-x: auto;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-default);
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .terminal-dot.red { background: #ff5f57; }
        .terminal-dot.yellow { background: #febc2e; }
        .terminal-dot.green { background: #28c840; }

        .terminal-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        .terminal-line {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .terminal-prompt {
            color: var(--accent-green);
        }

        .terminal-command {
            color: var(--text-primary);
        }

        .terminal-url {
            color: var(--accent-cyan);
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-green));
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: opacity 0.2s, transform 0.2s;
        }

        .home-link:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .subtitle {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .subtitle a {
            color: var(--accent-purple);
            text-decoration: none;
        }

        .subtitle a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="glow glow-purple"></div>
    <div class="glow glow-green"></div>

    <div class="container">
        <div class="error-code">404</div>
        <p class="message">This page doesn't exist — but your dev environment can.<br>Set up WSL2 in one command:</p>

        <div class="terminal-block">
            <div class="terminal-header">
                <span class="terminal-dot red"></span>
                <span class="terminal-dot yellow"></span>
                <span class="terminal-dot green"></span>
                <span class="terminal-title">bash</span>
            </div>
            <div class="terminal-line">
                <span class="terminal-prompt">$</span>
                <span class="terminal-command"> wget -qO- </span><span class="terminal-url">https://kodra.wsl.codetocloud.io/boot.sh</span><span class="terminal-command"> | bash</span>
            </div>
        </div>

        <a href="https://kodra.wsl.codetocloud.io" class="home-link">← Back to Kodra WSL</a>

        <p class="subtitle">
            <a href="https://github.com/codetocloudorg/kodra-wsl">GitHub</a> · 
            <a href="https://discord.gg/vwfwq2EpXJ">Discord</a> · 
            <a href="https://www.codetocloud.io">Code To Cloud</a>
        </p>
    </div>
</body>
</html>
