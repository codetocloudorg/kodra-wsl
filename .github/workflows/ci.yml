name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Check shell scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" -not -path "./node_modules/*" | while read f; do
            echo "Checking $f..."
            shellcheck "$f" || true
          done
      - name: Syntax check all scripts
        run: |
          ERRORS=0
          for f in $(find . -name "*.sh" -not -path "./.git/*" -not -path "./node_modules/*"); do
            bash -n "$f" || ERRORS=$((ERRORS + 1))
          done
          exit $ERRORS
