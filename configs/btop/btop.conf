#? Kodra WSL — btop configuration
#? Optimized for Windows Terminal transparency

color_theme = "Default"

#* Transparent background for Windows Terminal
theme_background = False

vim_keys = True
rounded_corners = True
graph_symbol = "braille"

#* Update interval in milliseconds
update_ms = 2000

proc_sorting = "cpu lazy"
proc_tree = True
proc_reversed = False
proc_per_core = False
proc_gradient = True
proc_filter_kernel = True

shown_boxes = "cpu mem net proc"

#* Network interface to show (empty = auto)
net_iface = ""

#* Show battery stats (not relevant in WSL but harmless)
show_battery = False

#* Clock format in top bar
clock_format = "%X"

#* Logging level
log_level = "WARNING"
